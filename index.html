*{margin:0;padding:0;box-sizing:border-box}
html{height:100%;overflow:hidden;position:fixed;inset:0}
body{
  height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(160deg,#0b0b2a,#1b1464 40%,#3a0e5c);
  font-family:'Boogaloo',cursive,sans-serif;
  user-select:none;-webkit-user-select:none;
  touch-action:manipulation;
  overflow:hidden;
  overscroll-behavior:none;
  -webkit-overflow-scrolling:none;
  padding:env(safe-area-inset-top,8px) 10px env(safe-area-inset-bottom,8px);
}
h1{font-size:clamp(1.6rem,7vw,2.8rem);color:#ffd700;text-shadow:0 0 16px rgba(255,215,0,.6),0 3px 0 #c5960c;margin-bottom:4px;line-height:1.1}

/* HUD */
#hud{width:100%;max-width:340px;margin-bottom:6px;display:none}
.row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
#scoreVal{color:#ffd700;font-size:1.3rem}
#comboVal{color:#ff6b81;font-size:.9rem;display:none}
#bestHud{color:rgba(255,255,255,.5);font-size:.75rem}
#timerVal{color:#fff;font-size:1.1rem}
#barWrap{height:6px;border-radius:3px;background:rgba(255,255,255,.15);overflow:hidden}
#bar{height:100%;border-radius:3px;width:100%;background:#2ed573;transition:width 1s linear,background .5s}

/* Menu & Over */
#menu,#over{text-align:center;margin-bottom:6px}
#over{display:none}
#overMsg{color:#ffd700;font-size:1.4rem;transition:color .2s}
#overScore{color:#fff;font-size:1.05rem}
#overTrapMsg{color:#ff6b81;font-size:.9rem;display:none;margin-bottom:2px}
#overRecord{color:#ff6b81;font-size:.85rem;display:none}
#overBest{color:rgba(255,255,255,.55);font-size:.8rem;margin-top:2px}

#menuPreview{width:clamp(60px,18vw,85px);height:clamp(60px,18vw,85px);border-radius:50%;border:3px solid #ffd700;overflow:hidden;margin:6px auto;box-shadow:0 0 18px rgba(255,215,0,.4);background:#2a1506}
#menuPreview img{width:100%;height:100%;object-fit:cover;display:block}
#menuTip{color:rgba(255,255,255,.65);font-size:clamp(.8rem,3.5vw,.95rem);margin:6px 0 3px}
#menuTip2{color:rgba(255,107,129,.7);font-size:clamp(.65rem,2.8vw,.8rem);margin-bottom:3px}
#menuRecord{color:#ffd700;font-size:.85rem;display:none}

/* Grid */
#grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:clamp(8px,2.5vw,14px);
  max-width:340px;width:100%;
  padding:clamp(12px,3vw,20px) clamp(10px,3vw,16px);
  background:radial-gradient(ellipse at 50% 40%,#3ea55b,#1a6d2f 70%,#0d4a1b);
  border-radius:18px;
  box-shadow:0 8px 30px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.08);
  flex-shrink:0;
}
.hole{
  position:relative;aspect-ratio:1;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#6b3a1a,#2a1506);
  box-shadow:inset 0 5px 12px rgba(0,0,0,.8),0 2px 4px rgba(0,0,0,.3);
  overflow:hidden;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}

/* Mole */
.mole{position:absolute;left:50%;bottom:-100%;transform:translateX(-50%) scale(1);width:82%;height:82%;transition:bottom .2s ease-in,transform .1s}
.mole.show{bottom:2%;transition:bottom .13s cubic-bezier(.34,1.56,.64,1),transform .1s}
.mole.hit{transform:translateX(-50%) rotate(20deg) scale(.55)}
.face-ring{width:100%;height:100%;border-radius:50%;overflow:hidden;border:3px solid #ffd700;box-shadow:0 0 10px rgba(255,215,0,.5);position:relative;background:#2a1506}
.mole.hit .face-ring{box-shadow:0 0 20px rgba(255,40,40,.9)}
.face-ring img{display:block;width:100%;height:100%;object-fit:cover;pointer-events:none}
.mole.hit .face-ring img{filter:brightness(2) saturate(.3)}

/* Trap */
.trap-text{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:clamp(.42rem,2vw,.65rem);font-family:'Boogaloo',cursive,sans-serif;text-align:center;line-height:1.15;width:85%;pointer-events:none;text-shadow:0 1px 4px rgba(0,0,0,.9)}
.mole.trap .face-ring img{display:none}
.mole.trap .trap-text{display:block}
.mole.trap .face-ring{border-color:#ff6b81;box-shadow:0 0 10px rgba(255,107,129,.5);background:radial-gradient(circle at 35% 35%,#3a0e18,#1a0510);animation:trapGlow .5s ease-in-out infinite alternate}
.mole.trap.hit .face-ring{animation:none;box-shadow:0 0 30px rgba(255,40,40,1);border-color:#ff4757}
@keyframes trapGlow{from{box-shadow:0 0 8px rgba(255,107,129,.35)}to{box-shadow:0 0 18px rgba(255,107,129,.75)}}

.hcover{position:absolute;bottom:0;left:0;right:0;height:22%;background:linear-gradient(to top,#2a1506 30%,transparent);pointer-events:none;display:none}
.boom{position:absolute;top:-4px;right:0;font-size:clamp(1rem,4vw,1.5rem);animation:flyUp .35s ease-out forwards;pointer-events:none}
.float{position:fixed;color:#ffd700;font-size:1.4rem;font-weight:700;pointer-events:none;z-index:99;text-shadow:0 2px 6px rgba(0,0,0,.7);animation:scoreUp .65s ease-out forwards}

/* Hammer */
.hammer{position:fixed;font-size:clamp(1.6rem,6vw,2.2rem);pointer-events:none;z-index:100;animation:hammerHit .28s ease-out forwards;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5))}
@keyframes hammerHit{
  0%{transform:translate(-50%,-120%) rotate(-45deg) scale(1.3);opacity:1}
  35%{transform:translate(-50%,-60%) rotate(15deg) scale(1);opacity:1}
  70%{transform:translate(-50%,-55%) rotate(10deg) scale(.95);opacity:.8}
  100%{transform:translate(-50%,-45%) rotate(10deg) scale(.6);opacity:0}
}

/* Trap flash */
#trapFlash{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,20,20,.35);pointer-events:none;z-index:200;animation:flashRed .6s ease-out forwards}
@keyframes flashRed{0%{opacity:1}100%{opacity:0}}

/* Button */
#playBtn{
  margin-top:clamp(8px,2vh,16px);padding:clamp(10px,2.5vh,14px) clamp(30px,10vw,44px);
  font-size:clamp(1rem,4vw,1.3rem);font-family:inherit;color:#1a0a2e;
  background:linear-gradient(135deg,#ffd700,#ff9f43);border:none;border-radius:50px;
  cursor:pointer;box-shadow:0 4px 16px rgba(255,159,67,.5);
  -webkit-tap-highlight-color:transparent;
  flex-shrink:0;
}
#playBtn:active{transform:scale(.95);box-shadow:0 2px 8px rgba(255,159,67,.4)}

@keyframes flyUp{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-18px) scale(1.3)}}
@keyframes scoreUp{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-36px)}}
</style>

const W=48,H=48;
function buildFace(){const r=atob(PX);const c=document.createElement("canvas");c.width=W;c.height=H;const x=c.getContext("2d");const d=x.createImageData(W,H);for(let i=0;i<r.length;i++)d.data[i]=r.charCodeAt(i);x.putImageData(d,0,0);const c2=document.createElement("canvas");c2.width=200;c2.height=200;const x2=c2.getContext("2d");x2.imageSmoothingEnabled=true;x2.imageSmoothingQuality="high";x2.drawImage(c,0,0,200,200);return c2.toDataURL("image/png")}
const FACE=buildFace();

/* ── Config ── */
const GN=9, DUR=60;

/* ── State ── */
let phase="menu", score=0, sec=DUR, combo=0;
let best=parseInt(localStorage.getItem("tapetaupe_best")||"0");
let upS=new Set(), hitS=new Set(), trapS=new Set();
let clk, spw;

const $=id=>document.getElementById(id);
const g=$("grid");

/* ── Menu preview ── */
const pi=document.createElement("img"); pi.src=FACE;
$("menuPreview").appendChild(pi);
updateBest();

/* ── Build grid ── */
for(let i=0;i<GN;i++){
  const h=document.createElement("div"); h.className="hole";
  const m=document.createElement("div"); m.className="mole"; m.id="m"+i;
  const r=document.createElement("div"); r.className="face-ring";
  const img=document.createElement("img"); img.src=FACE;
  const tt=document.createElement("div"); tt.className="trap-text"; tt.textContent="Ce n'est pas Anas !";
  r.appendChild(img); r.appendChild(tt); m.appendChild(r);
  const cv=document.createElement("div"); cv.className="hcover"; cv.id="c"+i;
  h.appendChild(m); h.appendChild(cv);
  h.addEventListener("pointerdown",function(e){e.preventDefault();whack(i,e)});
  g.appendChild(h);
}
$("playBtn").addEventListener("click",start);

/* ── Prevent all default touch behaviour ── */
document.addEventListener("touchmove",function(e){e.preventDefault()},{passive:false});

/* ── Record display ── */
function updateBest(){
  const mr=$("menuRecord");
  if(best>0){mr.style.display="block";mr.textContent="\uD83C\uDFC6 Record : "+best}
  else{mr.style.display="none"}
  $("bestHud").textContent="\uD83C\uDFC6 "+best;
  const ob=$("overBest");
  if(ob) ob.textContent="Record : "+best;
}

/* ── Start ── */
function start(){
  phase="play"; score=0; sec=DUR; combo=0;
  upS.clear(); hitS.clear(); trapS.clear(); hideAll();
  $("hud").style.display="block";
  $("menu").style.display="none";
  $("over").style.display="none";
  $("playBtn").style.display="none";
  $("scoreVal").textContent="0";
  $("comboVal").style.display="none";
  $("timerVal").textContent=sec+"s";
  $("bar").style.width="100%";
  $("bar").style.background="#2ed573";
  updateBest();
  clk=setInterval(tick,1000);
  spawn();
}

/* ── Timer ── */
function tick(){
  sec--;
  if(sec<=0){end(false);return}
  $("timerVal").textContent=sec+"s";
  const p=(sec/DUR)*100;
  $("bar").style.width=p+"%";
  $("bar").style.background=p>33?"#2ed573":p>16?"#ffa502":"#ff4757";
}

/* ── Difficulty phase ── */
function df(){return sec>40?"s":sec>20?"m":"f"}

/* ── Spawn ── */
function spawn(){
  clearTimeout(spw);
  if(phase!=="play")return;
  const d=df();
  const n= d==="f"?3 : d==="m"?2 : 1;
  const trapChance= d==="f"?0.32 : d==="m"?0.24 : 0.14;
  const addTrap= Math.random()<trapChance;

  hideAll(); upS.clear(); hitS.clear(); trapS.clear();

  const pk=new Set();
  while(pk.size<n) pk.add(Math.floor(Math.random()*GN));

  if(addTrap){
    let ti;
    do{ti=Math.floor(Math.random()*GN)}while(pk.has(ti));
    trapS.add(ti); upS.add(ti);
    const tm=$("m"+ti);
    tm.classList.add("show","trap");
    tm.classList.remove("hit");
    $("c"+ti).style.display="block";
  }

  pk.forEach(function(i){
    upS.add(i);
    const mm=$("m"+i);
    mm.classList.add("show");
    mm.classList.remove("hit","trap");
    $("c"+i).style.display="block";
  });

  const hideDelay= d==="f"?520 : d==="m"?700 : 880;
  setTimeout(hideAll, hideDelay);
  spw=setTimeout(spawn, d==="f"?700 : d==="m"?980 : 1280);
}

/* ── Hide all moles ── */
function hideAll(){
  for(var i=0;i<GN;i++){
    $("m"+i).classList.remove("show","hit","trap");
    $("c"+i).style.display="none";
    var booms=$("m"+i).querySelectorAll(".boom");
    for(var j=0;j<booms.length;j++) booms[j].remove();
  }
  upS.clear(); trapS.clear();
}

/* ── Hammer effect ── */
function showHammer(e){
  var x=e.clientX||((e.touches&&e.touches[0])?e.touches[0].clientX:0);
  var y=e.clientY||((e.touches&&e.touches[0])?e.touches[0].clientY:0);
  var h=document.createElement("div");
  h.className="hammer";
  h.textContent="\uD83D\uDD28";
  h.style.left=x+"px";
  h.style.top=y+"px";
  document.body.appendChild(h);
  setTimeout(function(){h.remove()},350);
}

/* ── Whack ── */
function whack(i,e){
  if(phase!=="play")return;
  showHammer(e);

  if(!upS.has(i)||hitS.has(i)){combo=0;uc();return}

  if(trapS.has(i)){
    hitS.add(i);
    $("m"+i).classList.add("hit");
    end(true);
    return;
  }

  hitS.add(i);
  $("m"+i).classList.add("hit");
  $("c"+i).style.display="none";
  var b=document.createElement("span"); b.className="boom"; b.textContent="\uD83D\uDCA5";
  $("m"+i).appendChild(b);
  combo++;
  var pts= combo>=5?3 : combo>=3?2 : 1;
  score+=pts;
  $("scoreVal").textContent=score;
  uc();

  var rc=e.currentTarget.getBoundingClientRect();
  var fl=document.createElement("div"); fl.className="float";
  fl.textContent="+"+pts;
  fl.style.left=(rc.left+rc.width/2)+"px";
  fl.style.top=(rc.top-8)+"px";
  fl.style.transform="translateX(-50%)";
  document.body.appendChild(fl);
  setTimeout(function(){fl.remove()},700);

  if(navigator.vibrate) navigator.vibrate(30);
}

/* ── Combo display ── */
function uc(){
  var cv=$("comboVal");
  if(combo>=3){cv.style.display="inline";cv.textContent="COMBO x"+combo+" !"}
  else{cv.style.display="none"}
}

/* ── End game ── */
function end(trap){
  phase="over";
  clearInterval(clk);
  clearTimeout(spw);

  if(trap){
    var flash=document.createElement("div"); flash.id="trapFlash";
    document.body.appendChild(flash);
    setTimeout(function(){flash.remove();hideAll()},650);
    if(navigator.vibrate) navigator.vibrate([50,30,80]);
  }else{
    hideAll();
  }

  $("hud").style.display="none";
  $("over").style.display="block";
  $("playBtn").style.display="inline-block";
  $("playBtn").textContent="REJOUER";

  if(trap){
    $("overMsg").textContent="\uD83D\uDC80 PIEGE !";
    $("overMsg").style.color="#ff4757";
    $("overTrapMsg").style.display="block";
  }else{
    $("overMsg").textContent= score>=60?"INCROYABLE !" : score>=30?"BIEN JOUE !" : "PAS MAL !";
    $("overMsg").style.color="#ffd700";
    $("overTrapMsg").style.display="none";
  }

  $("overScore").innerHTML='Score : <span style="color:#ffd700">'+score+"</span>";

  if(score>best){
    best=score;
    localStorage.setItem("tapetaupe_best",best.toString());
    $("overRecord").style.display="block";
  }else{
    $("overRecord").style.display="none";
  }
  updateBest();
}
</script>
</body>
</html>
